name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/ruff-action@v3

  checkov:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          config_file: .checkov.yaml
