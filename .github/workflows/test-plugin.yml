name: "[Tests] Playnite Plugin Build"

on:
  push:
    branches: [main]
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      plugin: ${{ steps.filter.outputs.plugin }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            plugin:
              - "playnite-plugin/**"

  build-plugin:
    name: Build Playnite plugin
    needs: changes
    if: needs.changes.outputs.plugin == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "6.x"

      - name: Build
        run: dotnet build playnite-plugin\EuterpiumExporter.csproj --configuration Release
