name: "[Tests] Acceptance Testing"

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    uses: istic/shared-workflows/.github/workflows/python-tests.yml@main
    with:
      python_version: "3.12"
    secrets: inherit # pragma: allowlist secret

  build-plugin:
    name: Build Playnite plugin
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.x"

      - name: Build
        run: dotnet build playnite-plugin\EuterpiumExporter.csproj --configuration Release
