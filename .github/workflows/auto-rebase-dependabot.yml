name: "[Auto] Rebase dependabot-updates onto main"

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  rebase:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rebase dependabot-updates onto main
        run: |
          if git ls-remote --exit-code origin dependabot-updates; then
            git checkout dependabot-updates
            git rebase origin/main
          else
            git checkout -b dependabot-updates origin/main
          fi
          git push origin dependabot-updates --force-with-lease

      - name: Open PR if one doesn't exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh pr view dependabot-updates --json number 2>/dev/null; then
            gh pr create \
              --base main \
              --head dependabot-updates \
              --title "🛡️ dependabot updates" \
              --body "Aggregated dependabot dependency updates." \
              --draft
          fi
