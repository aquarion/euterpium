name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      deploy_version:
        description: "Version to deploy (e.g. v1.2.3)"
        required: true
  # Allows other workflows to call this workflow directly
  workflow_call:
    inputs:
      deploy_version:
        description: "Tag to deploy"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.x"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-windows-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-windows-

      - name: Add Poetry to PATH
        shell: pwsh
        run: echo "$env:USERPROFILE\.local\bin" >> $env:GITHUB_PATH

      - name: Install dependencies
        run: poetry install --with dev

      - name: Set release version from tag
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $content = Get-Content version.py -Raw
          $content = $content -replace '__version__ = ".*"', "__version__ = `"$version`""
          Set-Content version.py $content
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV
          echo "RELEASE_TAG=$tag" >> $env:GITHUB_ENV

      - name: Test after version replacement
        run: poetry run pytest --tb=short -q
        shell: pwsh

      - name: Set release version from input
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
        shell: pwsh
        env:
          DEPLOY_VERSION: ${{ inputs.deploy_version }}
        run: |
          $tag = $env:DEPLOY_VERSION
          $version = $tag.TrimStart('v')
          if (-not ($version -match '^\d+\.\d+\.\d+$')) {
            throw "Invalid deploy_version '$tag'. Expected semantic version like v1.2.3 or 1.2.3"
          }
          $content = Get-Content version.py -Raw
          $content = $content -replace '__version__ = ".*"', "__version__ = `"$version`""
          Set-Content version.py $content
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV
          echo "RELEASE_TAG=$tag" >> $env:GITHUB_ENV

      - name: Test after version replacement
        run: poetry run pytest --tb=short -q
        shell: pwsh

      - name: Build Playnite plugin
        shell: pwsh
        run: |
          $version = $env:APP_VERSION
          (Get-Content playnite-plugin\extension.yaml) -replace '^Version:.*', "Version: $version" |
            Set-Content playnite-plugin\extension.yaml
          dotnet build playnite-plugin\EuterpiumExporter.csproj --configuration Release
          $versionUnderscored = $version -replace '\.', '_'
          $pext = "EuterpiumExporter_a1b2c3d4-e5f6-7890-abcd-ef1234567890_${versionUnderscored}.pext"
          $outDir = "playnite-plugin\bin\Release\net462"
          Compress-Archive -Path "$outDir\EuterpiumExporter.dll", "$outDir\extension.yaml", "$outDir\icon.png" -DestinationPath $pext
          echo "PLUGIN_ZIP=$pext" >> $env:GITHUB_ENV

      - name: Build with PyInstaller
        run: poetry run pyinstaller euterpium.spec

      - name: Install Inno Setup (pinned)
        run: choco install innosetup --version=6.7.1 --allow-downgrade --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $isccCandidates = @(
            "C:\Program Files\Inno Setup 6\ISCC.exe",
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          )
          $iscc = $isccCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) {
            throw "ISCC.exe not found in expected locations"
          }
          & $iscc "/DAppVersion=$env:APP_VERSION" "/DReleaseTag=$env:RELEASE_TAG" euterpium.iss

      - name: Zip the build
        run: |
          $tag = $env:RELEASE_TAG
          $zip = "euterpium-${tag}-windows.zip"
          $installer = "dist/installer/euterpium-${tag}-setup.exe"
          $checksum = "${installer}.sha256"
          Compress-Archive -Path dist\euterpium\* -DestinationPath $zip
          $hash = (Get-FileHash $installer -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path $checksum -Value $hash -NoNewline
          echo "ZIP_NAME=$zip" >> $env:GITHUB_ENV
          echo "INSTALLER_NAME=$installer" >> $env:GITHUB_ENV
          echo "CHECKSUM_NAME=$checksum" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Euterpium ${{ env.RELEASE_TAG }}"
          generate_release_notes: true
          draft: true
          make_latest: false
          overwrite_files: true
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.INSTALLER_NAME }}
            ${{ env.CHECKSUM_NAME }}
            ${{ env.PLUGIN_ZIP }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
        run: gh release edit ${{ env.RELEASE_TAG }} --draft=false --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update addon installer manifest
        shell: pwsh
        run: |
          $version = $env:APP_VERSION
          $versionUnderscored = $version -replace '\.', '_'
          $pextName = "EuterpiumExporter_a1b2c3d4-e5f6-7890-abcd-ef1234567890_${versionUnderscored}.pext"
          $pextUrl = "https://github.com/aquarion/euterpium/releases/download/$env:RELEASE_TAG/$pextName"
          $releaseDate = (Get-Date -Format "yyyy-MM-dd")

          try {
            $current = (Invoke-WebRequest -Uri "https://raw.githubusercontent.com/aquarion/euterpium/gh-pages/InstallerManifest.yaml" -UseBasicParsing).Content
          } catch {
            $current = "AddonId: EuterpiumExporter_a1b2c3d4-e5f6-7890-abcd-ef1234567890`nPackages:`n"
          }

          $newEntry = "  - Version: $version`n    RequiredApiVersion: 6.0.0`n    ReleaseDate: $releaseDate`n    PackageUrl: $pextUrl`n    Changelog:`n      - See https://github.com/aquarion/euterpium/releases/tag/$env:RELEASE_TAG`n"
          $updated = $current -replace '(Packages:\r?\n)', "`$1$newEntry"

          New-Item -ItemType Directory -Force -Path gh-pages-out | Out-Null
          Set-Content gh-pages-out\InstallerManifest.yaml $updated -NoNewline

      - name: Deploy manifest to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-out
          keep_files: true

      - name: Clean up artifacts
        run: |
          Remove-Item ${{ env.ZIP_NAME }}
          Remove-Item ${{ env.INSTALLER_NAME }}
          Remove-Item ${{ env.CHECKSUM_NAME }}
          Remove-Item ${{ env.PLUGIN_ZIP }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
