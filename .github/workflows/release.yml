name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      deploy_version:
        description: "Version to deploy (e.g. v1.2.3)"
        required: true
  # Allows other workflows to call this workflow directly
  workflow_call:
    inputs:
      deploy_version:
        description: "Tag to deploy"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-windows-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-windows-

      - name: Add Poetry to PATH
        shell: pwsh
        run: echo "$env:USERPROFILE\.local\bin" >> $env:GITHUB_PATH

      - name: Install dependencies
        run: poetry install --with dev

      - name: Set release version from tag
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $content = Get-Content version.py -Raw
          $content = $content -replace '__version__ = ".*"', "__version__ = `"$version`""
          Set-Content version.py $content
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV
          echo "RELEASE_TAG=$tag" >> $env:GITHUB_ENV

      - name: Test after version replacement
        if: github.event_name == 'push'
        run: poetry run pytest --tb=short -q
        shell: pwsh

      - name: Set release version from input
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
        shell: pwsh
        env:
          DEPLOY_VERSION: ${{ inputs.deploy_version }}
        run: |
          $tag = $env:DEPLOY_VERSION
          $version = $tag.TrimStart('v')
          if (-not ($version -match '^\d+\.\d+\.\d+$')) {
            throw "Invalid deploy_version '$tag'. Expected semantic version like v1.2.3 or 1.2.3"
          }
          $content = Get-Content version.py -Raw
          $content = $content -replace '__version__ = ".*"', "__version__ = `"$version`""
          Set-Content version.py $content
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV
          echo "RELEASE_TAG=$tag" >> $env:GITHUB_ENV

      - name: Test after version replacement
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
        run: poetry run pytest --tb=short -q
        shell: pwsh

      - name: Build with PyInstaller
        run: poetry run pyinstaller euterpium.spec

      - name: Install Inno Setup (pinned)
        run: choco install innosetup --version=6.7.1 --allow-downgrade --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $isccCandidates = @(
            "C:\Program Files\Inno Setup 6\ISCC.exe",
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          )
          $iscc = $isccCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) {
            throw "ISCC.exe not found in expected locations"
          }
          & $iscc "/DAppVersion=$env:APP_VERSION" "/DReleaseTag=$env:RELEASE_TAG" euterpium.iss

      - name: Zip the build
        run: |
          $tag = $env:RELEASE_TAG
          $zip = "euterpium-${tag}-windows.zip"
          $installer = "dist/installer/euterpium-${tag}-setup.exe"
          $checksum = "${installer}.sha256"
          Compress-Archive -Path dist\euterpium\* -DestinationPath $zip
          $hash = (Get-FileHash $installer -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path $checksum -Value $hash -NoNewline
          echo "ZIP_NAME=$zip" >> $env:GITHUB_ENV
          echo "INSTALLER_NAME=$installer" >> $env:GITHUB_ENV
          echo "CHECKSUM_NAME=$checksum" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Euterpium ${{ env.RELEASE_TAG }}"
          generate_release_notes: true
          draft: true
          make_latest: false
          overwrite_files: true
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.INSTALLER_NAME }}
            ${{ env.CHECKSUM_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
        run: gh release edit ${{ env.RELEASE_TAG }} --draft=false --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up artifacts
        run: |
          Remove-Item ${{ env.ZIP_NAME }}
          Remove-Item ${{ env.INSTALLER_NAME }}
          Remove-Item ${{ env.CHECKSUM_NAME }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
