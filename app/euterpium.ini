[logging]
; Log level: DEBUG, INFO, WARNING, ERROR (default: INFO)
level = INFO

[acrcloud]
host        = identify-eu-west-1.acrcloud.com
access_key  =
access_secret =

[api]
active = dev

[api:dev]
url =
key =

[api:stage]
url =
key =

[api:live]
url =
key =

[audio]
sample_rate           = 44100
capture_seconds       = 10
poll_interval         = 1.0
min_silence_before_change = 2
min_rms               = 0.01    ; RMS below this is treated as silence
spectral_flatness_threshold = 0.6  ; 0=pure tone, 1=noise — audio above this skips ACRCloud
fingerprint_bands     = 32         ; number of log-spaced frequency bands in the fingerprint
fingerprint_change_threshold = 0.35  ; fraction of fingerprint bits that must differ to signal a track change

[smtc]
; Comma-separated list of app name substrings to ignore when reading media sessions.
; Any session whose app ID contains one of these strings (case-insensitive) is skipped.
ignore = chrome.exe, firefox.exe

[playnite]
; Path to the file the Euterpium Exporter plugin writes when a game is running.
; Leave blank to use the default: %APPDATA%\Playnite\euterpium_current_game.json
; current_game_file =

[rest_api]
; Local REST API server — used by the Playnite plugin and other integrations.
; Set enabled = false to disable the server entirely.
enabled = true
port = 43174
; Bearer token for the REST API. Auto-generated on first run and stored here.
; The Playnite plugin reads this file, so it picks up the key automatically.
; key = <auto-generated>

[games]
; Format: process_name.exe = Display Name
; These entries take precedence over games detected via Playnite.
ffxiv_dx11.exe  = Final Fantasy XIV
ffxiv.exe       = Final Fantasy XIV
Cyberpunk2077.exe = Cyberpunk 2077
RocketLeague.exe  = Rocket League
witcher3.exe      = The Witcher 3
bg3.exe           = Baldur's Gate 3
eldenring.exe     = Elden Ring
