[acrcloud]
host        = identify-eu-west-1.acrcloud.com
access_key  =
access_secret =

[api]
active = dev

[api:dev]
url =
key =

[api:stage]
url =
key =

[api:live]
url =
key =

[audio]
sample_rate           = 44100
capture_seconds       = 10
poll_interval         = 1.0
change_threshold      = 0.08
min_silence_before_change = 2

[smtc]
; Comma-separated list of app name substrings to ignore when reading media sessions.
; Any session whose app ID contains one of these strings (case-insensitive) is skipped.
ignore = chrome.exe, firefox.exe

[playnite]
; Path to the JSON file exported by the Euterpium Exporter Playnite plugin.
; Leave blank to use the default: %APPDATA%\Playnite\euterpium_games.json
; games_file =

[games]
; Format: process_name.exe = Display Name
; These entries take precedence over games detected via Playnite.
ffxiv_dx11.exe  = Final Fantasy XIV
ffxiv.exe       = Final Fantasy XIV
Cyberpunk2077.exe = Cyberpunk 2077
RocketLeague.exe  = Rocket League
witcher3.exe      = The Witcher 3
bg3.exe           = Baldur's Gate 3
eldenring.exe     = Elden Ring
